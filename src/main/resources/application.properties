# =====================================================================
#  MIFIDEV-otp application configuration.
#
#  Every key below can be overridden with an environment variable:
#  the key is upper-cased and dots are replaced with underscores.
#  Example:  server.port  ->  SERVER_PORT
#            db.url        ->  DB_URL
#  Environment variables always take precedence over this file.
# =====================================================================

# ---- HTTP server ----
server.port=8080
server.threads=16

# ---- Database (PostgreSQL 17) ----
db.url=jdbc:postgresql://localhost:5432/otp
db.user=otp
db.password=otp
db.pool.size=10

# ---- JWT (token auth/authz) ----
# Signing key for HMAC-SHA256. Leave EMPTY for local development: the app then
# generates a random, ephemeral key on each start (tokens do not survive restart).
# For a stable key set jwt.secret here or the JWT_SECRET env var (>= 32 bytes).
jwt.secret=
jwt.ttl.seconds=3600
jwt.issuer=mifidev-otp

# ---- OTP defaults (seed values for the single otp_config row) ----
otp.default.length=6
otp.default.ttl.seconds=300

# ---- Expiration scheduler ----
otp.scheduler.interval.seconds=30

# ---- File channel (saved in the project root) ----
otp.file.path=otp-codes.txt

# ---- Default delivery channel when the request does not specify one ----
# Allowed: EMAIL | SMS | TELEGRAM | FILE
otp.default.channel=FILE

# ---- Email channel (SMTP). Defaults target a MailHog emulator. ----
email.enabled=true
email.smtp.host=localhost
email.smtp.port=1025
email.smtp.auth=false
email.smtp.starttls=false
email.username=
email.password=
email.from=otp-service@promoit.local

# ---- SMS channel (SMPP emulator, e.g. SMPPsim) ----
sms.enabled=true
smpp.host=localhost
smpp.port=2775
smpp.system_id=smppclient1
smpp.password=password
smpp.system_type=OTP
smpp.source_addr=OTPService

# ---- Telegram channel ----
# Disabled by default: set the token/chat id and flip the flag to enable.
telegram.enabled=false
telegram.api.url=https://api.telegram.org
telegram.bot.token=
telegram.chat.id=
